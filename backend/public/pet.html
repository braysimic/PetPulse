<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawTech | Pet Profile</title>

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<div class="container py-5">

  <!-- Back Button -->
  <a href="/dashboard.html" class="btn btn-outline-secondary mb-4">
    ← Back to Dashboard
  </a>

  <div class="row justify-content-center">
    <div class="col-md-7">

      <div class="card shadow-sm p-4">

        <!-- Pet Avatar -->
        <div class="text-center mb-4">
          <img
            id="petImage"
            src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
            class="rounded-circle mb-3"
            width="130"
            height="130"
            style="object-fit:cover;border:3px solid #eee;"
          />

          <input
            type="file"
            id="petPicture"
            class="form-control"
            accept="image/*"
          />

          <small class="text-muted">
            Profile picture upload (UI only for now)
          </small>
        </div>

        <!-- ================= TABS ================= -->
        <ul class="nav nav-tabs mb-4" id="petTabs">

          <li class="nav-item">
            <button
              class="nav-link active"
              data-bs-toggle="tab"
              data-bs-target="#profileTab">
              🐾 Profile
            </button>
          </li>

          <li class="nav-item">
            <button
              class="nav-link"
              data-bs-toggle="tab"
              data-bs-target="#documentsTab">
              📄 Documents
            </button>
          </li>

          <li class="nav-item">
            <button
              class="nav-link"
              data-bs-toggle="tab"
              data-bs-target="#medicationsTab">
              💊 Medications
            </button>
          </li>

        </ul>

        <!-- ================= TAB CONTENT ================= -->
        <div class="tab-content">

          <!-- PROFILE TAB -->
          <div class="tab-pane fade show active" id="profileTab">

            <form id="petForm">

              <div class="mb-3">
                <label class="form-label fw-semibold">Pet Name</label>
                <input
                  id="petName"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Species</label>

                <select
                  id="petSpecies"
                  class="form-select"
                  required
                >
                  <option value="">Select Species</option>
                  <option value="Dog">Dog</option>
                  <option value="Cat">Cat</option>
                  <option value="Bird">Bird</option>
                  <option value="Rabbit">Rabbit</option>
                  <option value="Hamster">Hamster</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Breed</label>
                <input
                  id="petBreed"
                  class="form-control"
                  required
                />
              </div>

              <button class="btn btn-primary w-100 mb-3">
                Save Changes
              </button>

            </form>

            <button
              id="deletePetBtn"
              class="btn btn-outline-danger w-100">
              Delete Pet
            </button>

            <div id="petMessage" class="mt-3"></div>

          </div>


          <!-- DOCUMENTS TAB -->
          <div class="tab-pane fade" id="documentsTab">

            <div class="text-center py-5">

              <h5 class="fw-bold">Pet Documents</h5>

              <p class="text-muted">
                Upload vet records, vaccination cards,
                and medical documents here.
              </p>

              <button class="btn btn-outline-primary">
                Upload Document (Coming Soon)
              </button>

            </div>

          </div>


          <!-- MEDICATIONS TAB -->
          <div class="tab-pane fade" id="medicationsTab">

            <div class="text-center py-5">

              <h5 class="fw-bold">Medications</h5>

              <p class="text-muted">
                Track medications and prescriptions
                for this pet.
              </p>

              <button class="btn btn-outline-primary">
                Add Medication (Coming Soon)
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/pet.js"></script>

</body>
</html>
