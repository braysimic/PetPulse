<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawTech | Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<div id="navbarContainer"></div>

<div class="container py-5">

  <!-- HEADER -->
  <div class="mb-4">
    <h2 class="fw-bold app-title mb-0">Dashboard</h2>
    <p class="text-muted sub-script mb-0">Welcome back!</p>
  </div>

  <!-- ACTION CARDS -->
  <div class="row g-4 mb-4">

    <div class="col-md-6">
      <div class="card shadow-sm dashboard-card p-4 h-100">
        <h5 class="fw-bold">
          <i class="bi bi-list-check me-2"></i>
          Manage Activities
        </h5>
        <p class="text-muted small">
          Add tasks, set reminders, and track daily pet care activities.
        </p>
        <a href="/activities.html" class="btn btn-primary mt-auto">
          Go to Activities
        </a>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm dashboard-card p-4 h-100">
        <h5 class="fw-bold">
          <i class="bi bi-graph-up me-2"></i>
          Pet Stats This Week
        </h5>
        <ul class="text-muted small">
          <li>Dynamic stats coming soon</li>
        </ul>
      </div>
    </div>

  </div>

  <!-- 🔥 DYNAMIC PET CARDS -->
  <div class="row g-4 mb-5" id="petCardsContainer"></div>

  <!-- REMINDERS -->
  <div class="card shadow-sm p-4">
    <h5 class="fw-bold mb-3">
      <i class="bi bi-alarm me-2"></i>
      Upcoming Reminders
    </h5>

    <div id="dashboardReminders">
      <p class="text-muted">Loading reminders...</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
